<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A to Z about たっちゃん — 華金クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Zen+Maru+Gothic:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fde8e8;
  --pink: #e8637a;
  --pink-dark: #c04060;
  --pink-pale: #fff0f2;
  --pink-mid: #f5b8c4;
  --gold: #c8953a;
  --dark: #2a1520;
  --mid: #7a4055;
  --muted: #b08090;
  --white: #ffffff;
}
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 20% 20%, #f9c4d088 0%, transparent 45%),
    radial-gradient(circle at 80% 80%, #ffd6a088 0%, transparent 45%);
  pointer-events: none; z-index: 0;
}
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; }

#top {
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 1.5rem;
  text-align: center;
  gap: 1.2rem;
}
.book-cover {
  background: var(--pink);
  border-radius: 18px;
  padding: 2.2rem 2rem 1.8rem;
  max-width: 300px;
  width: 100%;
  box-shadow: 0 12px 48px rgba(200,80,100,0.28);
  animation: floatIn 0.8s cubic-bezier(.17,.67,.3,1.1) both;
  position: relative; overflow: hidden;
}
.book-cover::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
  pointer-events: none;
}
.script-title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(1.2rem, 5vw, 1.6rem);
  color: var(--dark);
  line-height: 1.3;
  margin-bottom: 0.3rem;
  text-align: center;
  letter-spacing: 0.01em;
}
.script-sub {
  font-size: 0.72rem;
  color: rgba(42,21,32,0.65);
  letter-spacing: 0.05em;
  margin-bottom: 1.2rem;
  font-style: italic;
}
.cake-frame {
  background: rgba(255,255,255,0.25);
  border-radius: 12px;
  padding: 1.4rem 1rem;
  margin-bottom: 1.2rem;
  font-size: 3.2rem;
  line-height: 1;
}
.cover-name { font-size: 0.85rem; font-weight: 700; color: var(--dark); letter-spacing: 0.12em; }
.cover-pub { font-size: 0.62rem; color: rgba(42,21,32,0.5); margin-top: 0.2rem; letter-spacing: 0.08em; }
.page-catch {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(0.9rem, 3.5vw, 1.1rem);
  color: var(--mid); line-height: 1.8;
  animation: fadeUp 0.7s ease 0.3s both;
}
.dot-row { display: flex; gap: 0.5rem; justify-content: center; animation: fadeUp 0.7s ease 0.4s both; }
.dot-row span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--pink);
  animation: dotpulse 1.8s ease-in-out infinite;
}
.dot-row span:nth-child(2) { animation-delay: 0.3s; background: var(--gold); }
.dot-row span:nth-child(3) { animation-delay: 0.6s; }
@keyframes dotpulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.5);opacity:1} }
.btn-start {
  background: var(--dark);
  color: var(--pink-pale);
  border: none; border-radius: 100px;
  padding: 1.1rem 3.2rem;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 1rem; font-weight: 900;
  cursor: pointer; letter-spacing: 0.1em;
  box-shadow: 0 6px 24px rgba(42,21,32,0.25);
  transition: transform 0.15s, background 0.2s;
  animation: fadeUp 0.7s ease 0.5s both;
}
.btn-start:hover { transform: translateY(-3px); background: var(--pink-dark); }

#quiz { min-height: 100vh; flex-direction: column; align-items: center; padding: 1.5rem 1rem 3rem; }
.quiz-inner { width: 100%; max-width: 500px; }
.q-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.4rem; }
.q-num-label { font-family: 'Dancing Script', cursive; font-size: 1rem; color: var(--pink-dark); white-space: nowrap; min-width: 60px; }
.prog-wrap { flex: 1; height: 6px; background: var(--pink-mid); border-radius: 100px; overflow: hidden; }
.prog-bar { height: 100%; background: linear-gradient(90deg, var(--pink-dark), var(--gold)); border-radius: 100px; transition: width 0.5s ease; }
.score-disp { font-size: 0.75rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
.alpha-card {
  background: var(--pink); border-radius: 20px 20px 0 0;
  padding: 1.4rem 1.8rem 1rem;
  display: flex; align-items: center; gap: 1.2rem;
}
.alpha-big { font-family: 'Dancing Script', cursive; font-size: 3.2rem; color: var(--white); line-height: 1; min-width: 50px; }
.alpha-word { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 0.1rem; }
.alpha-hint { font-size: 0.75rem; color: rgba(255,255,255,0.75); font-style: italic; }
.q-box {
  background: var(--white); border-radius: 0 0 20px 20px;
  padding: 1.5rem 1.6rem 1.8rem;
  box-shadow: 0 6px 28px rgba(200,80,100,0.1);
  margin-bottom: 1rem;
}
.q-text { font-family: 'Shippori Mincho', serif; font-size: clamp(0.95rem, 3.2vw, 1.1rem); font-weight: 700; line-height: 1.8; color: var(--dark); }
.choices { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1rem; }
.ch-btn {
  background: var(--white); border: 2px solid var(--pink-mid); border-radius: 14px;
  padding: 0.95rem 1.3rem;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.92rem; font-weight: 700; color: var(--dark);
  cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: 0.8rem;
  transition: all 0.16s ease;
}
.ch-btn:hover:not(:disabled) { border-color: var(--pink); background: var(--pink-pale); transform: translateX(5px); }
.ch-mark {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg); border: 1.5px solid var(--pink-mid);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Dancing Script', cursive; font-size: 1rem; font-weight: 700;
  color: var(--pink); flex-shrink: 0; transition: all 0.16s;
}
.ch-btn:hover:not(:disabled) .ch-mark { background: var(--pink); color: white; border-color: var(--pink); }
.ch-btn.correct { border-color: #5cb85c; background: #f0faf0; }
.ch-btn.correct .ch-mark { background: #5cb85c; color: white; border-color: #5cb85c; }
.ch-btn.wrong { border-color: #e05050; background: #fff0f0; }
.ch-btn.wrong .ch-mark { background: #e05050; color: white; border-color: #e05050; }
.ch-btn:disabled { cursor: default; transform: none !important; }
.exp-box {
  display: none;
  background: linear-gradient(135deg, #fff8f0, #fff0f5);
  border-left: 4px solid var(--gold); border-radius: 0 12px 12px 0;
  padding: 1rem 1.2rem;
  font-size: 0.87rem; color: var(--mid); line-height: 1.75;
  margin-bottom: 0.8rem;
}
.exp-box.show { display: block; }
.exp-label { font-size: 0.72rem; font-weight: 900; color: var(--gold); letter-spacing: 0.08em; margin-bottom: 0.3rem; }
.video-link {
  display: none;
  align-items: center;
  gap: 0.6rem;
  background: var(--white);
  border: 2px solid var(--pink-mid);
  border-radius: 12px;
  padding: 0.75rem 1.1rem;
  margin-bottom: 1rem;
  text-decoration: none;
  color: var(--pink-dark);
  font-size: 0.88rem;
  font-weight: 700;
  transition: all 0.16s;
}
.video-link.show { display: flex; }
.video-link:hover { background: var(--pink-pale); border-color: var(--pink); transform: translateY(-1px); }
.video-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: #ff0000;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.video-icon svg { width: 16px; height: 16px; fill: white; }
.video-txt { flex: 1; }
.video-txt-main { font-size: 0.88rem; font-weight: 700; color: var(--pink-dark); }
.video-txt-sub { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
.video-arrow { font-size: 0.9rem; color: var(--muted); }
.btn-next {
  display: none; width: 100%;
  background: var(--dark); color: var(--pink-pale);
  border: none; border-radius: 14px; padding: 1rem;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.98rem; font-weight: 900; cursor: pointer;
  letter-spacing: 0.06em; transition: transform 0.15s, background 0.15s;
}
.btn-next.show { display: block; }
.btn-next:hover { transform: translateY(-2px); background: var(--pink-dark); }

#result { min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; text-align: center; gap: 1rem; }
.result-icon { font-size: 4rem; animation: pop 0.6s cubic-bezier(.17,.67,.3,1.4) both; display: block; }
@keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.result-script { font-family: 'Dancing Script', cursive; font-size: clamp(2rem, 8vw, 3rem); color: var(--pink-dark); }
.result-card {
  background: var(--white); border-radius: 24px; padding: 2rem;
  max-width: 400px; width: 100%;
  box-shadow: 0 8px 40px rgba(200,80,100,0.15); border: 1.5px solid var(--pink-mid);
}
.score-huge { font-family: 'Dancing Script', cursive; font-size: 5rem; color: var(--pink); line-height: 1; }
.score-denom { font-size: 1.1rem; color: var(--muted); margin-bottom: 0.3rem; }
.rank-txt { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.8rem; }
.star-row { font-size: 1.5rem; margin-bottom: 1.2rem; }
.bday-card {
  background: var(--pink); border-radius: 14px; padding: 1.3rem 1.4rem;
  font-family: 'Shippori Mincho', serif; font-size: 0.9rem; line-height: 2;
  color: var(--white); margin-bottom: 1.2rem; white-space: pre-line;
}
.btn-retry {
  background: transparent; border: 2px solid var(--dark); color: var(--dark);
  border-radius: 100px; padding: 0.85rem 2.4rem;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
}
.btn-retry:hover { background: var(--dark); color: var(--pink-pale); }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes floatIn { from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
</style>
</head>
<body>

<!-- TOP -->
<div class="screen active" id="top">
  <div class="book-cover">
    <div class="script-title">A to Z<br>about たっちゃん</div>
    <div class="script-sub">You jump, I jump — Hanakin Couple</div>
    <div class="cake-frame">🎂</div>
    <div class="cover-name">華金カップル</div>
    <div class="cover-pub">KODANSHA</div>
  </div>
  <p class="page-catch">たつやのことを<br>どれだけ知ってる？</p>
  <div class="dot-row"><span></span><span></span><span></span></div>
  <button class="btn-start" onclick="startQuiz()">クイズスタート 🎉</button>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="quiz-inner">
    <div class="q-header">
      <span class="q-num-label" id="qLabel">Q1 / 26</span>
      <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
      <span class="score-disp" id="scoreTxt">✨ 0点</span>
    </div>
    <div class="alpha-card">
      <div class="alpha-big" id="alphaLetter">A</div>
      <div>
        <div class="alpha-word" id="alphaWord">Animal</div>
        <div class="alpha-hint" id="alphaHint">動物について</div>
      </div>
    </div>
    <div class="q-box">
      <p class="q-text" id="qText">問題文</p>
    </div>
    <div class="choices" id="choices"></div>
    <div class="exp-box" id="expBox">
      <div class="exp-label">📖 ANSWER</div>
      <div id="expText"></div>
    </div>
    <a class="video-link" id="videoLink" target="_blank" rel="noopener">
      <div class="video-icon">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="video-txt">
        <div class="video-txt-main">動画はこちら 🎬</div>
        <div class="video-txt-sub">YouTubeで確認する</div>
      </div>
      <span class="video-arrow">→</span>
    </a>
    <button class="btn-next" id="btnNext" onclick="nextQ()">次の問題へ →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <span class="result-icon" id="resultIcon" style="display:none"></span>
  <div class="result-script" id="resultScript">You did it!</div>
  <div class="result-card">
    <div class="score-huge" id="scoreHuge">0</div>
    <div class="score-denom" id="scoreDenom">/ 26問</div>
    <div class="rank-txt" id="rankTxt" style="display:none"></div>
    <div class="star-row" id="starRow">⭐⭐⭐</div>
    <div class="bday-card" id="bdayMsg"></div>
  </div>
  <button class="btn-retry" onclick="restart()">もう一度挑戦する 🔄</button>
</div>

// 正解位置をシャッフルする関数
function makeChoices(correct, wrongs) {
  // 全選択肢をランダムに並べて正解インデックスを返す
  var all = wrongs.slice();
  var pos = Math.floor(Math.random() * 4);
  all.splice(pos, 0, correct);
  return { choices: all, ans: pos };
}

// 選択肢をシャッフルしてQUIZZESを生成
var QUIZZES = RAW.map(function(r) {
  var all = r.wrongs.slice();
  var pos = Math.floor(Math.random() * 4);
  all.splice(pos, 0, r.correct);
  return {
    letter: r.letter, word: r.word, hint: r.hint,
    q: r.q, choices: all, ans: pos,
    exp: r.exp, url: r.url
  };
});

const BDAY_MSG = "たっちゃん\nお誕生日おめでとうございます🎂\n\nいつも動画に元気をもらっています！\nこれからもずっと応援しています🤍\nHappy Birthday!!";

var current = 0, score = 0;
var total = QUIZZES.length;

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function startQuiz() { current = 0; score = 0; show('quiz'); loadQ(); }
function loadQ() {
  var d = QUIZZES[current];
  document.getElementById('qLabel').textContent = 'Q' + (current+1) + ' / ' + total;
  document.getElementById('progBar').style.width = (current / total * 100) + '%';
  document.getElementById('scoreTxt').textContent = '✨ ' + score + '点';
  document.getElementById('alphaLetter').textContent = d.letter;
  document.getElementById('alphaWord').textContent = d.word;
  document.getElementById('alphaHint').textContent = d.hint;
  document.getElementById('qText').textContent = d.q;
  document.getElementById('expBox').classList.remove('show');
  document.getElementById('expText').textContent = '';
  document.getElementById('btnNext').classList.remove('show');
  document.getElementById('videoLink').classList.remove('show');
  var el = document.getElementById('choices');
  el.innerHTML = '';
  ['A','B','C','D'].forEach(function(m, i) {
    var btn = document.createElement('button');
    btn.className = 'ch-btn';
    btn.innerHTML = '<span class="ch-mark">' + m + '</span>' + d.choices[i];
    btn.onclick = function(){ selectAnswer(i); };
    el.appendChild(btn);
  });
}
function selectAnswer(idx) {
  var d = QUIZZES[current];
  document.querySelectorAll('.ch-btn').forEach(function(b, i) {
    b.disabled = true;
    if (i === d.ans) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });
  if (idx === d.ans) score++;
  document.getElementById('expText').textContent = d.exp;
  document.getElementById('expBox').classList.add('show');
  document.getElementById('btnNext').classList.add('show');
  document.getElementById('scoreTxt').textContent = '✨ ' + score + '点';
  var vl = document.getElementById('videoLink');
  if (d.url) {
    vl.href = d.url;
    var isInsta = d.url.indexOf('instagram') !== -1;
    vl.querySelector('.video-txt-main').textContent = isInsta ? '投稿はこちら 📸' : '動画はこちら 🎬';
    vl.querySelector('.video-txt-sub').textContent = isInsta ? 'Instagramで確認する' : 'YouTubeで確認する';
    vl.querySelector('.video-icon').style.background = isInsta ? '#e1306c' : '#ff0000';
    vl.classList.add('show');
  }
}
function nextQ() {
  current++;
  if (current >= total) showResult(); else loadQ();
}
function showResult() {
  show('result');
  var pct = score / total;
  var emoji, msg, rank, stars;
  emoji=''; msg='クイズはここまでだよ！お疲れ様！！'; rank=''; stars='';
  document.getElementById('resultIcon').textContent = emoji;
  document.getElementById('resultScript').textContent = msg;
  document.getElementById('scoreHuge').textContent = score;
  document.getElementById('scoreDenom').textContent = '/ ' + total + '問';
  document.getElementById('rankTxt').textContent = rank;
  document.getElementById('starRow').textContent = stars;
  document.getElementById('bdayMsg').textContent = BDAY_MSG;
}
function restart() { current = 0; score = 0; show('top'); }
